<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bluCredit - Pengajuan Instan</title>
    <style>
        /* CSS ALA BLU BY BCA DIGITAL */
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --blu-primary: #00c2cb; /* Cyan khas blu */
            --blu-dark: #008f96;
            --blu-bg: #f4f7f8;
            --text-main: #2d3748;
            --text-muted: #718096;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--blu-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Simulasi Layar HP */
        .app-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            min-height: 800px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--blu-primary), var(--blu-dark));
            color: white;
            padding: 40px 20px 30px;
            text-align: center;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 25px 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--blu-primary);
            box-shadow: 0 0 0 3px rgba(0, 194, 203, 0.2);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--blu-primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
            font-family: inherit;
        }

        .btn-primary:hover {
            background-color: var(--blu-dark);
        }

        /* Styling untuk Hasil Output */
        #resultCard {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-score {
            font-size: 36px;
            font-weight: 800;
            margin: 10px 0;
        }

        .status-diterima { background-color: #e6ffed; border: 1px solid #34d399; }
        .status-diterima .result-score { color: #059669; }
        
        .status-ditolak { background-color: #fee2e2; border: 1px solid #f87171; }
        .status-ditolak .result-score { color: #dc2626; }

        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: var(--blu-primary);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>bluCredit</h1>
        <p>Evaluasi Kredit Pintar & Cepat</p>
    </div>

    <div class="content">
        <form id="creditForm">
            <div class="form-group">
                <label>Pendapatan Tahunan ($)</label>
                <input type="number" id="person_income" class="form-control" value="50000" required>
            </div>
            
            <div class="form-group">
                <label>Jumlah Pinjaman ($)</label>
                <input type="number" id="loan_amnt" class="form-control" value="10000" required>
            </div>

            <div class="form-group">
                <label>Suku Bunga (%)</label>
                <input type="number" step="0.1" id="loan_int_rate" class="form-control" value="10.5" required>
            </div>

            <div class="form-group">
                <label>Status Tempat Tinggal</label>
                <select id="person_home_ownership" class="form-control">
                    <option value="RENT">Sewa / Kos (RENT)</option>
                    <option value="OWN">Milik Sendiri (OWN)</option>
                    <option value="MORTGAGE">KPR (MORTGAGE)</option>
                    <option value="OTHER">Lainnya (OTHER)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Tujuan Pinjaman</label>
                <select id="loan_intent" class="form-control">
                    <option value="PERSONAL">Keperluan Pribadi</option>
                    <option value="EDUCATION">Pendidikan</option>
                    <option value="MEDICAL">Medis / Kesehatan</option>
                    <option value="VENTURE">Modal Usaha</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Evaluasi Sekarang</button>
        </form>

        <div class="loader" id="loader">Memproses data... ⏳</div>

        <div id="resultCard">
            <div style="font-size: 14px; font-weight: 700; color: var(--text-muted);">Total Skor Kredit</div>
            <div class="result-score" id="scoreValue">0</div>
            <p id="resultMessage" style="font-size: 14px; margin: 0;"></p>
        </div>
    </div>
</div>

<script>
    // JAVASCRIPT UNTUK MENEMBAK API FASTAPI
    document.getElementById('creditForm').addEventListener('submit', async function(e) {
        e.preventDefault(); // Mencegah halaman refresh
        
        // Tampilkan loading, sembunyikan hasil sebelumnya
        document.getElementById('loader').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';
        
        // Rakit data dari form
        const payload = {
            person_income: parseFloat(document.getElementById('person_income').value),
            loan_amnt: parseFloat(document.getElementById('loan_amnt').value),
            loan_int_rate: parseFloat(document.getElementById('loan_int_rate').value),
            person_home_ownership: document.getElementById('person_home_ownership').value,
            loan_intent: document.getElementById('loan_intent').value
        };

        try {
            // Tembak API FastAPI
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            
            // Sembunyikan loading
            document.getElementById('loader').style.display = 'none';
            
            // Tampilkan UI Hasil
            const resultCard = document.getElementById('resultCard');
            resultCard.style.display = 'block';
            
            // Masukkan data ke dalam HTML
            document.getElementById('scoreValue').innerText = data.total_skor;
            document.getElementById('resultMessage').innerText = data.pesan;
            
            // Ubah warna card berdasarkan status (Hijau/Merah)
            if(data.status_pengajuan === "DITERIMA") {
                resultCard.className = "status-diterima";
            } else {
                resultCard.className = "status-ditolak";
            }

        } catch (error) {
            document.getElementById('loader').style.display = 'none';
            alert("Gagal terhubung ke API. Pastikan FastAPI sudah menyala!");
            console.error(error);
        }
    });
</script>

</body>
</html>
